<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0F0A07" />
  <title>BookShelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0F0A07;
      --surface:  #1A1108;
      --card:     #221608;
      --border:   #3D2A0F;
      --gold:     #C9932A;
      --goldsoft: #E8B84B;
      --cream:    #F0E6D3;
      --muted:    #7A6248;
      --danger:   #8B2020;
    }
    html, body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      color: var(--cream);
      overscroll-behavior: none;
    }
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    /* ─── Top accent ─── */
    .top-bar {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: 3px; z-index: 200;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* ─── Bottom Nav ─── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .nav-btn {
      flex: 1; background: none; border: none;
      padding: 10px 0 14px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      position: relative; transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-icon {
      font-size: 16px; color: var(--muted); transition: color .2s;
    }
    .nav-label {
      font-family: 'Lato', sans-serif;
      font-size: 9.5px; font-weight: 400;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--muted); transition: color .2s;
    }
    .nav-btn.active .nav-icon,
    .nav-btn.active .nav-label { color: var(--gold); font-weight: 700; }
    .nav-btn.active::after {
      content: ''; position: absolute; bottom: 0;
      width: 24px; height: 2px;
      background: var(--gold); border-radius: 2px;
    }

    /* ─── Content ─── */
    .content { padding: 0 16px 100px; }
    .section-header {
      padding: 20px 0 12px;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: var(--cream); font-style: italic;
    }
    .section-count {
      font-family: 'Lato', sans-serif;
      font-size: 12px; color: var(--muted);
    }

    /* ─── FAB ─── */
    .fab {
      position: fixed; bottom: 80px; right: calc(50% - 230px);
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #A06D15);
      border: none; color: #0F0A07;
      font-size: 26px; font-weight: 700;
      cursor: pointer; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px #C9932A55;
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(.94); }

    /* ─── Cards ─── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .card-body { padding: 14px 16px; cursor: pointer; }
    .card-expanded { padding: 0 16px 14px; border-top: 1px solid var(--border); }
    .book-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px; color: var(--cream); line-height: 1.3; margin-bottom: 3px;
    }
    .book-author {
      font-family: 'Lato', sans-serif;
      font-size: 12px; color: var(--muted); margin-bottom: 6px;
    }
    .book-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .book-info { text-align: right; flex-shrink: 0; }
    .book-pages, .book-date {
      font-family: 'Lato', sans-serif; font-size: 11px; color: var(--muted);
    }
    .book-date { margin-top: 2px; }
    .toggle-arrow { color: var(--muted); font-size: 14px; margin-top: 6px; display: block; }
    .book-note {
      font-family: 'Lato', sans-serif; font-size: 13px;
      color: #F0E6D3CC; line-height: 1.6; margin: 12px 0 10px; font-style: italic;
    }
    .row { display: flex; gap: 8px; margin-top: 10px; }

    /* ─── Badges ─── */
    .badge {
      font-family: 'Lato', sans-serif; font-weight: 700;
      font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 20px;
      background: #3D2A0F33; border: 1px solid #3D2A0F66; color: var(--muted);
    }
    .badge-gold { background: #C9932A33; border-color: #C9932A66; color: var(--gold); }
    .badge-red  { background: #C94B2A33; border-color: #C94B2A66; color: #C94B2A; }

    /* ─── Stars ─── */
    .stars { display: flex; gap: 3px; }
    .star { cursor: pointer; user-select: none; transition: color .15s; }
    .star.on  { color: var(--gold); }
    .star.off { color: var(--border); }
    .star.readonly { cursor: default; font-size: 14px; }

    /* ─── Buttons ─── */
    .btn {
      flex: 1; padding: 8px 0; cursor: pointer;
      border-radius: 8px; font-family: 'Lato', sans-serif;
      font-size: 12px; transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-outline {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
    }
    .btn-danger {
      background: #8B202022; border: 1px solid #8B202044; color: #8B2020CC;
    }
    .btn-icon {
      flex: none; padding: 5px 8px; border-radius: 6px; font-size: 12px;
      cursor: pointer; font-family: 'Lato', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), #A06D15);
      color: #0F0A07; font-family: 'Lato', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: .05em;
      cursor: pointer; transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* ─── Progress bar ─── */
    .progress-wrap { height: 4px; background: var(--border); border-radius: 4px; margin: 12px 0 10px; overflow: hidden; }
    .progress-bar  { height: 100%; background: linear-gradient(90deg, var(--gold), var(--goldsoft)); border-radius: 4px; transition: width .4s ease; }
    .pct-big { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--gold); }
    .pct-sub { font-family: 'Lato', sans-serif; font-size: 10px; color: var(--muted); }

    /* ─── Wishlist card ─── */
    .wish-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
    }
    .wish-stripe { width: 4px; height: 44px; border-radius: 4px; flex-shrink: 0; }
    .wish-info { flex: 1; min-width: 0; }
    .wish-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--cream); margin-bottom: 4px; }
    .wish-meta  { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .wish-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ─── Stats ─── */
    .kpi-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .kpi-card {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 8px; text-align: center;
    }
    .kpi-value {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: var(--gold); font-weight: 700;
    }
    .kpi-label {
      font-family: 'Lato', sans-serif; font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-top: 2px;
    }
    .chart-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 16px;
    }
    .chart-title {
      font-family: 'Lato', sans-serif; font-size: 11px;
      letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }
    .bar-row { display: flex; align-items: flex-end; gap: 4px; height: 64px; }
    .bar-col  { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar-fill { width: 100%; border-radius: 3px 3px 0 0; transition: height .3s ease; }
    .bar-lbl  { font-family: 'Lato', sans-serif; font-size: 9px; color: var(--muted); }
    .genre-row { margin-bottom: 10px; }
    .genre-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .genre-name { font-family: 'Lato', sans-serif; font-size: 13px; color: var(--cream); }
    .genre-count { font-family: 'Lato', sans-serif; font-size: 12px; color: var(--muted); }
    .genre-track { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .genre-fill  { height: 100%; background: var(--gold); border-radius: 3px; }

    /* ─── Empty state ─── */
    .empty { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 44px; margin-bottom: 14px; }
    .empty-text {
      font-family: 'Playfair Display', serif;
      font-size: 16px; color: var(--muted); font-style: italic; line-height: 1.6;
    }

    /* ─── Divider ─── */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 14px 0; }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.85); backdrop-filter: blur(4px);
      overflow-y: auto;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 20px 16px 60px;
    }
    .modal-box {
      width: 100%; max-width: 480px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: var(--cream); font-style: italic;
    }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 26px; cursor: pointer; line-height: 1; padding: 0;
    }
    .modal-body { padding: 20px; }

    /* ─── Form ─── */
    .field { margin-bottom: 14px; }
    .field-label {
      display: block; font-family: 'Lato', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 5px;
    }
    .field-row { display: flex; gap: 10px; }
    .field-row .field { flex: 1; }
    input[type=text], input[type=number], input[type=date], select, textarea {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; color: var(--cream);
      font-family: 'Lato', sans-serif; font-size: 14px;
      outline: none; box-sizing: border-box;
      -webkit-appearance: none; appearance: none;
    }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(.4); }
    textarea { resize: vertical; min-height: 70px; }
    select option { background: var(--surface); }
    .priority-row { display: flex; gap: 8px; }
    .priority-btn {
      flex: 1; padding: 8px 0;
      border-radius: 8px; font-family: 'Lato', sans-serif;
      font-size: 11px; cursor: pointer; transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── Stats header ─── */
    .stats-header {
      font-family: 'Lato', sans-serif; font-size: 13px;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted); text-align: center;
      padding: 20px 0 16px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
/* ─── State & Storage ─── */
const STORAGE_KEYS = { books: 'bs_books', current: 'bs_current', wishlist: 'bs_wishlist' };
const GENRES = ["Ficção","Não-ficção","Tecnologia","Negócios","Filosofia","Biografia","História","Autoajuda","Ciência","Romance","Psicologia","Outro"];
const PRIORITIES = ["Alta 🔥","Média ⭐","Baixa 📌"];
const MONTHS = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

let state = {
  tab: 'lidos',
  books: [],
  current: [],
  wishlist: [],
  modal: null,       // null | 'add' | 'edit'
  editItem: null,
  expandedIds: new Set(),
  formData: {},
  formRating: 0,
};

function load() {
  try {
    const b = localStorage.getItem(STORAGE_KEYS.books);
    const c = localStorage.getItem(STORAGE_KEYS.current);
    const w = localStorage.getItem(STORAGE_KEYS.wishlist);
    if (b) state.books    = JSON.parse(b);
    if (c) state.current  = JSON.parse(c);
    if (w) state.wishlist = JSON.parse(w);
  } catch(e) {}
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEYS.books,    JSON.stringify(state.books));
    localStorage.setItem(STORAGE_KEYS.current,  JSON.stringify(state.current));
    localStorage.setItem(STORAGE_KEYS.wishlist,  JSON.stringify(state.wishlist));
  } catch(e) {}
}

function uid() { return Math.random().toString(36).slice(2,9); }
function today() { return new Date().toISOString().split('T')[0]; }

/* ─── Re-render ─── */
function render() {
  document.getElementById('app').innerHTML = buildApp();
  attachEvents();
}

/* ─── HTML Builders ─── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildStars(value, readonly=true, inputName='') {
  return `<div class="stars">` + [1,2,3,4,5].map(s =>
    `<span class="star ${readonly?'readonly':''} ${s<=value?'on':'off'}"
      style="font-size:${readonly?14:22}px"
      ${!readonly ? `data-star="${s}" data-field="${inputName}"` : ''}
    >★</span>`
  ).join('') + `</div>`;
}

function buildBadge(text, cls='') {
  return `<span class="badge ${cls}">${esc(text)}</span>`;
}

function buildBookCard(b) {
  const expanded = state.expandedIds.has(b.id);
  const priColor = '';
  return `
  <div class="card" data-id="${b.id}">
    <div class="card-body" data-toggle="${b.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div class="book-title">${esc(b.title)}</div>
          ${b.author ? `<div class="book-author">${esc(b.author)}</div>` : ''}
          <div class="book-meta">
            ${buildStars(b.rating||0)}
            ${b.genre ? buildBadge(b.genre) : ''}
          </div>
        </div>
        <div class="book-info">
          ${b.pages ? `<div class="book-pages">${esc(b.pages)} pgs</div>` : ''}
          ${b.dateRead ? `<div class="book-date">${esc(b.dateRead)}</div>` : ''}
          <span class="toggle-arrow">${expanded?'▴':'▾'}</span>
        </div>
      </div>
    </div>
    ${expanded ? `
    <div class="card-expanded">
      ${b.notes ? `<p class="book-note">"${esc(b.notes)}"</p>` : ''}
      <div class="row">
        <button class="btn btn-outline" data-edit-book="${b.id}">Editar</button>
        <button class="btn btn-danger" data-del-book="${b.id}">Remover</button>
      </div>
    </div>` : ''}
  </div>`;
}

function buildCurrentCard(b) {
  const pct = (b.pages && b.pagesRead)
    ? Math.min(100, Math.round((Number(b.pagesRead)/Number(b.pages))*100)) : 0;
  return `
  <div class="card" style="padding:16px" data-id="${b.id}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1">
        <div class="book-title">${esc(b.title)}</div>
        ${b.author ? `<div class="book-author">${esc(b.author)}</div>` : ''}
        ${b.genre ? buildBadge(b.genre) : ''}
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:8px">
        <div class="pct-big">${pct}%</div>
        <div class="pct-sub">${b.pagesRead||0} / ${b.pages||'?'} pgs</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" style="width:${pct}%"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" data-edit-current="${b.id}">Atualizar progresso</button>
      <button class="btn-icon btn-danger" style="padding:7px 14px" data-del-current="${b.id}">✕</button>
    </div>
  </div>`;
}

function buildWishCard(b) {
  const priColor = b.priority==='Alta 🔥' ? '#C94B2A' : b.priority==='Média ⭐' ? '#C9932A' : '#7A6248';
  return `
  <div class="wish-card" data-id="${b.id}">
    <div class="wish-stripe" style="background:${priColor}"></div>
    <div class="wish-info">
      <div class="wish-title">${esc(b.title)}</div>
      <div class="wish-meta">
        ${b.author ? `<span style="font-family:'Lato',sans-serif;font-size:12px;color:var(--muted)">${esc(b.author)}</span>` : ''}
        ${b.genre ? buildBadge(b.genre) : ''}
        ${b.priority ? `<span class="badge" style="background:${priColor}33;border-color:${priColor}66;color:${priColor}">${esc(b.priority)}</span>` : ''}
      </div>
    </div>
    <div class="wish-actions">
      <button class="btn-icon btn-outline" data-edit-wish="${b.id}">✎</button>
      <button class="btn-icon btn-danger" data-del-wish="${b.id}">✕</button>
    </div>
  </div>`;
}

function buildStats() {
  const yr = new Date().getFullYear();
  const yb = state.books.filter(b => b.dateRead && b.dateRead.startsWith(String(yr)));
  const totalPages = yb.reduce((s,b) => s + (Number(b.pages)||0), 0);
  const avgRating  = yb.length ? (yb.reduce((s,b) => s+(b.rating||0),0)/yb.length).toFixed(1) : '—';

  const byGenre = {};
  yb.forEach(b => { if(b.genre) byGenre[b.genre] = (byGenre[b.genre]||0)+1; });
  const genreEntries = Object.entries(byGenre).sort((a,b)=>b[1]-a[1]);

  const byMonth = MONTHS.map((m,i) => ({
    m, n: yb.filter(b => b.dateRead && new Date(b.dateRead+'T12:00:00').getMonth()===i).length
  }));
  const maxM = Math.max(...byMonth.map(x=>x.n), 1);

  const kpis = [
    { label:'Lidos',   value: yb.length },
    { label:'Páginas', value: totalPages.toLocaleString('pt-BR') },
    { label:'Média ★', value: avgRating },
    { label:'Lendo',   value: state.current.length },
  ];

  return `
  <div class="content">
    <div class="stats-header">${yr} — Seu Ano em Livros</div>
    <div class="kpi-row">
      ${kpis.map(k=>`
      <div class="kpi-card">
        <div class="kpi-value">${k.value}</div>
        <div class="kpi-label">${k.label}</div>
      </div>`).join('')}
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Livros por mês</div>
      <div class="bar-row">
        ${byMonth.map(({m,n})=>`
        <div class="bar-col">
          <div class="bar-fill" style="height:${n>0?Math.round((n/maxM)*52):0}px;min-height:${n>0?4:0}px;background:${n>0?'linear-gradient(180deg,#E8B84B,#C9932A)':'var(--border)'}"></div>
          <div class="bar-lbl">${m}</div>
        </div>`).join('')}
      </div>
    </div>
    ${genreEntries.length > 0 ? `
    <div class="chart-wrap">
      <div class="chart-title">Gêneros mais lidos</div>
      ${genreEntries.slice(0,6).map(([g,n])=>`
      <div class="genre-row">
        <div class="genre-label-row">
          <span class="genre-name">${esc(g)}</span>
          <span class="genre-count">${n}</span>
        </div>
        <div class="genre-track">
          <div class="genre-fill" style="width:${Math.round((n/yb.length)*100)}%"></div>
        </div>
      </div>`).join('')}
    </div>` : ''}
    ${yb.length===0 ? `
    <div class="empty">
      <div class="empty-icon">📚</div>
      <div class="empty-text">Adicione seus primeiros livros para ver as estatísticas</div>
    </div>` : ''}
  </div>`;
}

/* ─── Modal Forms ─── */
function buildBookForm(d) {
  d = d || {};
  return `
  <div class="field">
    <label class="field-label">Título *</label>
    <input type="text" id="f_title" placeholder="Nome do livro" value="${esc(d.title||'')}">
  </div>
  <div class="field">
    <label class="field-label">Autor</label>
    <input type="text" id="f_author" placeholder="Nome do autor" value="${esc(d.author||'')}">
  </div>
  <div class="field-row">
    <div class="field">
      <label class="field-label">Data de leitura</label>
      <input type="date" id="f_dateRead" value="${esc(d.dateRead||today())}">
    </div>
    <div class="field">
      <label class="field-label">Páginas</label>
      <input type="number" id="f_pages" placeholder="000" value="${esc(d.pages||'')}" min="1">
    </div>

  <div class="field">
    <label class="field-label">Gênero</label>
    <select id="f_genre">
      <option value="">— Selecione —</option>
      ${GENRES.map(g=>`<option value="${esc(g)}" ${d.genre===g?'selected':''}>${esc(g)}</option>`).join('')}
    </select>

    <label class="field-label">Avaliação</label>

    <label class="field-label">Anotação / Impressão</label>

}

/* ─── Main App HTML ─── */
function buildApp() {
  const { tab, books, current, wishlist, modal, editItem } = state;

  // Modal title
  const modalTitles = {
    lidos:    editItem ? 'Editar livro'          : 'Registrar livro lido',
    lendo:    editItem ? 'Atualizar progresso'   : 'Adicionar leitura atual',
    wishlist: editItem ? 'Editar item'           : 'Adicionar à lista',
  };

  // Tab content
  let content = '';
  if (tab === 'lidos') {
    content = `
    <div class="content">
      <div class="section-header">
        <span class="section-title">Biblioteca</span>
        <span class="section-count">${books.length} ${books.length===1?'livro':'livros'}</span>
      </div>
      ${books.length===0
        ? `<div class="empty"><div class="empty-icon">📖</div><div class="empty-text">Sua biblioteca está vazia.<br>Adicione o primeiro livro que você leu!</div></div>`
        : books.map(buildBookCard).join('')}
    </div>`;
  } else if (tab === 'lendo') {
    content = `
    <div class="content">
      <div class="section-header">
        <span class="section-title">Lendo agora</span>
        <span class="section-count">${current.length} ${current.length===1?'livro':'livros'}</span>
      </div>
      ${current.length===0
        ? `<div class="empty"><div class="empty-icon">🕯️</div><div class="empty-text">Nenhum livro em andamento.<br>Qual você está lendo agora?</div></div>`
        : current.map(buildCurrentCard).join('')}
    </div>`;
  } else if (tab === 'wishlist') {
    content = `
    <div class="content">
      <div class="section-header">
        <span class="section-title">Quero ler</span>
        <span class="section-count">${wishlist.length} ${wishlist.length===1?'livro':'livros'}</span>
      </div>
      ${wishlist.length===0
        ? `<div class="empty"><div class="empty-icon">✨</div><div class="empty-text">Sua lista de desejos está vazia.<br>Adicione livros que você quer ler!</div></div>`
        : wishlist.map(buildWishCard).join('')}
    </div>`;
  } else if (tab === 'stats') {
    content = buildStats();
  }

  return `
  <div class="top-bar"></div>

  ${content}

  ${tab !== 'stats' ? `<button class="fab" id="fabBtn">+</button>` : ''}

  <nav class="bottom-nav">
    ${[
      { id:'lidos',    icon:'✦', label:'Lidos' },
      { id:'lendo',    icon:'◈', label:'Lendo' },
      { id:'wishlist', icon:'◇', label:'Quero Ler' },
      { id:'stats',    icon:'◉', label:'Estatísticas' },
    ].map(t=>`
    <button class="nav-btn ${tab===t.id?'active':''}" data-tab="${t.id}">
      <span class="nav-icon">${t.icon}</span>
      <span class="nav-label">${t.label}</span>
    </button>`).join('')}
  </nav>

  ${modal ? `
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">${esc(modalTitles[tab]||'')}</span>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body" id="modalBody">
        ${tab==='lidos'    ? buildBookForm(editItem)    : ''}
        ${tab==='lendo'    ? buildCurrentForm(editItem) : ''}
        ${tab==='wishlist' ? buildWishForm(editItem)    : ''}
      </div>
    </div>
  </div>` : ''}
  `;
}

/* ─── Event Wiring ─── */
let currentRating = 0;

function attachEvents() {
  // Nav tabs
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => { state.tab = el.dataset.tab; render(); });
  });

  // FAB
  const fab = document.getElementById('fabBtn');
  if (fab) fab.addEventListener('click', () => {
    state.modal = 'add'; state.editItem = null; currentRating = 0; render();
  });

  // Modal close
  const mc = document.getElementById('modalClose');
  if (mc) mc.addEventListener('click', () => { state.modal = null; state.editItem = null; render(); });
  const mo = document.getElementById('modalOverlay');
  if (mo) mo.addEventListener('click', e => {
    if (e.target === mo) { state.modal = null; state.editItem = null; render(); }
  });

  // Star rating in form
  document.querySelectorAll('.star[data-star]').forEach(el => {
    el.addEventListener('click', () => {
      currentRating = Number(el.dataset.star);
      document.querySelectorAll('.star[data-star]').forEach(s => {
        s.classList.toggle('on',  Number(s.dataset.star) <= currentRating);
        s.classList.toggle('off', Number(s.dataset.star) >  currentRating);
      });
    });
  });

  // Priority buttons
  document.querySelectorAll('[data-pri]').forEach(el => {
    el.addEventListener('click', () => {
      const pri = el.dataset.pri;
      document.querySelectorAll('[data-pri]').forEach(b => {
        const active = b.dataset.pri === pri;
        b.style.background = active ? '#C9932A33' : 'transparent';
        b.style.border = `1px solid ${active ? '#C9932A' : 'var(--border)'}`;
        b.style.color = active ? 'var(--gold)' : 'var(--muted)';
      });
    });
  });

  // Toggle expand book
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.toggle;
      if (state.expandedIds.has(id)) state.expandedIds.delete(id);
      else state.expandedIds.add(id);
      render();
    });
  });

  // Delete book
  document.querySelectorAll('[data-del-book]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.delBook;
      state.books = state.books.filter(b => b.id !== id);
      state.expandedIds.delete(id);
      save(); render();
    });
  });

  // Edit book
  document.querySelectorAll('[data-edit-book]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.editBook;
      state.editItem = state.books.find(b => b.id === id) || null;
      currentRating = state.editItem?.rating || 0;
      state.modal = 'edit'; render();
    });
  });

  // Delete current
  document.querySelectorAll('[data-del-current]').forEach(el => {
    el.addEventListener('click', () => {
      state.current = state.current.filter(b => b.id !== el.dataset.delCurrent);
      save(); render();
    });
  });

  // Edit current
  document.querySelectorAll('[data-edit-current]').forEach(el => {
    el.addEventListener('click', () => {
      state.editItem = state.current.find(b => b.id === el.dataset.editCurrent) || null;
      state.modal = 'edit'; render();
    });
  });

  // Delete wish
  document.querySelectorAll('[data-del-wish]').forEach(el => {
    el.addEventListener('click', () => {
      state.wishlist = state.wishlist.filter(b => b.id !== el.dataset.delWish);
      save(); render();
    });
  });

  // Edit wish
  document.querySelectorAll('[data-edit-wish]').forEach(el => {
    el.addEventListener('click', () => {
      state.editItem = state.wishlist.find(b => b.id === el.dataset.editWish) || null;
      state.modal = 'edit'; render();
    });
  });

  // Save book
  const saveBookBtn = document.getElementById('saveBookBtn');
  if (saveBookBtn) saveBookBtn.addEventListener('click', () => {
    const title = document.getElementById('f_title')?.value?.trim();
    if (!title) return;
    const item = {
      id: state.editItem?.id || uid(),
      title,
      author:   document.getElementById('f_author')?.value?.trim()   || '',
      dateRead: document.getElementById('f_dateRead')?.value         || '',
      pages:    document.getElementById('f_pages')?.value            || '',
      genre:    document.getElementById('f_genre')?.value            || '',
      notes:    document.getElementById('f_notes')?.value?.trim()    || '',
      rating:   currentRating,
    };
    if (state.editItem) {
      state.books = state.books.map(b => b.id === item.id ? item : b);
    } else {
      state.books.unshift(item);
    }
    state.modal = null; state.editItem = null; currentRating = 0;
    save(); render();
  });

  // Save current
  const saveCurrentBtn = document.getElementById('saveCurrentBtn');
  if (saveCurrentBtn) saveCurrentBtn.addEventListener('click', () => {
    const title = document.getElementById('f_title')?.value?.trim();
    if (!title) return;
    const item = {
      id:        state.editItem?.id || uid(),
      title,
      author:    document.getElementById('f_author')?.value?.trim()  || '',
      pages:     document.getElementById('f_pages')?.value           || '',
      pagesRead: document.getElementById('f_pagesRead')?.value       || '',
      genre:     document.getElementById('f_genre')?.value           || '',
    };
    if (state.editItem) {
      state.current = state.current.map(b => b.id === item.id ? item : b);
    } else {
      state.current.unshift(item);
    }
    state.modal = null; state.editItem = null;
    save(); render();
  });

  // Save wish
  const saveWishBtn = document.getElementById('saveWishBtn');
  if (saveWishBtn) saveWishBtn.addEventListener('click', () => {
    const title = document.getElementById('f_title')?.value?.trim();
    if (!title) return;
    const activePri = document.querySelector('[data-pri][style*="var(--gold)"]');
    const priority = activePri ? activePri.dataset.pri : 'Média ⭐';
    const item = {
      id:       state.editItem?.id || uid(),
      title,
      author:   document.getElementById('f_author')?.value?.trim() || '',
      genre:    document.getElementById('f_genre')?.value          || '',
      priority,
    };
    if (state.editItem) {
      state.wishlist = state.wishlist.map(b => b.id === item.id ? item : b);
    } else {
      state.wishlist.unshift(item);
    }
    state.modal = null; state.editItem = null;
    save(); render();
  });
}

/* ─── Boot ─── */
load();
render();
</script>
